name: tests

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall -q src tests benchmarks

      - name: Lint
        run: ruff check src tests benchmarks

      - name: Format check
        run: ruff format --check src tests benchmarks

      - name: Build package
        run: python -m build

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Run tests with coverage
        run: pytest --cov=clatsop --cov-report=term-missing

  notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install notebook dependencies
        run: python -m pip install -e ".[notebook]"

      - name: Execute the rule catalog
        env:
          MPLBACKEND: Agg
        run: |
          mkdir -p .notebook-build
          jupyter nbconvert --execute --to notebook --ExecutePreprocessor.timeout=600 --output-dir=.notebook-build notebooks/clatsop_rule_catalog.ipynb
